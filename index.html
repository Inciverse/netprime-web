    <style>
      :root {
        --bg: #0a0a0a;
        --surface: #141414;
        --card: #1f1f1f;
        --card-hover: #2a2a2a;
        --red: #e50914;
        --red-hover: #b20710;
        --text: #ffffff;
        --text-sub: #b3b3b3;
        --text-muted: #666666;
        --gold: #f5c518;
        --border: #222;
        --radius-sm: 4px;
        --radius: 6px;
        --radius-lg: 10px;
        --font: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        --tabs-h: 56px;
        --header-h: 68px;
      }
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html { scroll-behavior: smooth; }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: var(--font);
        min-height: 100dvh;
        overflow-x: hidden;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      ::-webkit-scrollbar { height: 6px; width: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: #555; }
      .app { min-height: 100dvh; }
      .screen { min-height: 100dvh; background: var(--bg); padding-bottom: calc(var(--tabs-h) + 14px); }

      /* Splash */
      .splash-screen {
        position: fixed; inset: 0;
        background: radial-gradient(ellipse at center, #160a0a 0%, #000 80%);
        z-index: 99999;
        display: flex; align-items: center; justify-content: center;
        transition: opacity 0.6s ease;
      }
      .splash-screen.fade-out { opacity: 0; pointer-events: none; }
      .splash-video { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: 1; }
      @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: none; } }

      /* Auth */
      .auth-screen {
        min-height: 100dvh;
        display: flex; align-items: center; justify-content: center;
        position: relative; overflow: hidden;
        background: linear-gradient(135deg, #0a0a0a 0%, #1a0505 50%, #0a0a0a 100%);
      }
      .auth-screen::after {
        content: ''; position: absolute; inset: 0;
        background:
          radial-gradient(ellipse at 30% 50%, rgba(229,9,20,0.12) 0%, transparent 60%),
          radial-gradient(ellipse at 70% 50%, rgba(229,9,20,0.08) 0%, transparent 60%);
        pointer-events: none;
      }
      .auth-inner { width: 100%; max-width: 440px; padding: 2.5rem; position: relative; z-index: 1; animation: fadeUp 0.5s ease both; }
      .auth-logo-row { margin-bottom: 6px; }
      .auth-logo { height: 50px; }
      .auth-tagline { color: var(--text-sub); font-size: 13px; margin-bottom: 2.5rem; }
      .auth-label { display: block; font-size: 20px; font-weight: 700; color: var(--text); margin-bottom: 12px; }
      .auth-input-row { position: relative; margin-bottom: 6px; }
      .auth-input-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-muted); width: 18px; height: 18px; pointer-events: none; }
      .auth-input {
        width: 100%; background: var(--surface); border: 1.5px solid rgba(255,255,255,0.12);
        border-radius: var(--radius-sm); color: var(--text); font-size: 16px; font-family: var(--font);
        padding: 14px 14px 14px 46px; outline: none; transition: border-color 0.2s, background 0.2s;
      }
      .auth-input:focus { border-color: var(--text); background: var(--card); }
      .auth-input-error, .auth-input.error { border-color: var(--red); }
      .auth-error { font-size: 12px; color: var(--red); margin-bottom: 8px; }
      .auth-btn {
        width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px;
        background: var(--red); color: #fff; border: none; border-radius: var(--radius-sm);
        padding: 15px; font-size: 16px; font-weight: 700; font-family: var(--font);
        cursor: pointer; margin-top: 18px; transition: background 0.2s, transform 0.1s;
      }
      .auth-btn:hover { background: var(--red-hover); }
      .auth-btn:active { transform: scale(0.99); }
      .auth-btn:disabled { opacity: 0.45; cursor: not-allowed; }
      .auth-disclaimer { color: var(--text-muted); font-size: 12px; text-align: center; margin-top: 1.5rem; }

      /* Header */
      .header {
        position: fixed; top: 0; left: 0; right: 0; z-index: 100;
        height: var(--header-h); display: flex; align-items: center;
        padding: 0 clamp(1.5rem, 4vw, 4rem); gap: 1.5rem; transition: background 0.4s ease;
      }
      .header.scrolled { background: linear-gradient(to bottom, rgba(10,10,10,0.95) 0%, rgba(10,10,10,0.7) 100%); backdrop-filter: blur(12px); }
      .header-logo { height: 26px; flex-shrink: 0; }
      .header-nav { display: flex; align-items: center; gap: 1.25rem; flex: 1; }
      .header-nav-btn { background: none; border: none; color: var(--text-sub); font-size: 14px; font-weight: 500; font-family: var(--font); cursor: pointer; padding: 4px 0; white-space: nowrap; transition: color 0.2s; }

      /* Bottom tabs */
      .bottom-tabs {

        display: flex; flex-direction: column; align-items: center; gap: 3px;
        padding: 8px 24px; border-radius: 6px; font-size: 10px; font-weight: 600; font-family: var(--font);
        letter-spacing: 0.3px; transition: color 0.2s;
      }
      .bottom-tab-btn svg { width: 22px; height: 22px; }
      .bottom-tab-btn.active { color: var(--red); }
      .bottom-tab-btn:hover { color: var(--text-sub); background: rgba(255,255,255,0.04); }

      /* Hero */
      .hero { position: relative; height: 56.25vw; min-height: 420px; max-height: 700px; overflow: hidden; }
      .hero-slide { position: absolute; inset: 0; opacity: 0; transition: opacity 1s ease; }
      .hero-slide.active { opacity: 1; }
      .hero-bg { width: 100%; height: 100%; object-fit: cover; object-position: center top; display: block; }
      .hero-overlay {
        position: absolute; inset: 0;
        background:
          linear-gradient(to top, var(--bg) 0%, transparent 50%),
          linear-gradient(to right, rgba(0,0,0,0.6) 0%, transparent 60%),
          linear-gradient(to bottom, rgba(0,0,0,0.3) 0%, var(--bg) 100%);
      }
      .hero-content { position: absolute; bottom: 28%; left: clamp(2rem, 6vw, 6rem); max-width: 600px; z-index: 2; }
      .hero-title { font-size: clamp(2rem, 5vw, 4rem); font-weight: 900; line-height: 1.05; margin-bottom: 0.75rem; letter-spacing: -0.5px; }
      .hero-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 0.75rem; color: var(--gold); font-weight: 700; font-size: 13px; }
      .hero-meta svg { width: 16px; height: 16px; color: var(--gold); }
      .hero-meta-sep { color: var(--text-sub); }
      .hero-meta span { color: var(--text-sub); }
      .hero-overview { color: var(--text); font-size: clamp(13px, 1.6vw, 16px); line-height: 1.55; margin-bottom: 1.25rem; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
      .hero-play-btn {
        display: inline-flex; align-items: center; gap: 8px; background: var(--text); color: #000;
        border: none; border-radius: var(--radius-sm); padding: 11px 28px; font-size: 15px; font-weight: 700;
        font-family: var(--font); cursor: pointer; transition: transform 0.15s, background 0.15s; white-space: nowrap;
      }
      .hero-play-btn svg { width: 22px; height: 22px; }
      .hero-play-btn:hover { background: #e6e6e6; transform: scale(1.03); }
      .hero-play-btn:active { transform: scale(0.97); }
      .hero-dots { position: absolute; bottom: 20px; right: clamp(1.5rem, 4vw, 4rem); display: flex; gap: 8px; z-index: 5; }
      .hero-dot { width: 12px; height: 12px; border-radius: 50%; background: rgba(255,255,255,0.35); border: 2px solid rgba(255,255,255,0.5); cursor: pointer; padding: 0; transition: all 0.3s ease; }
      .hero-dot.active { background: var(--text); border-color: var(--text); transform: scale(1.15); }
      .hero-dot:hover { background: rgba(255,255,255,0.7); border-color: rgba(255,255,255,0.8); }

      /* Content rows / cards */
      .content-row { padding: 0 0 1.5rem; }
      .content-row-title { font-size: 20px; font-weight: 700; color: var(--text); padding: 0 clamp(1.5rem, 4vw, 4rem); margin-bottom: 0.75rem; letter-spacing: 0.2px; }
      .content-row-scroll {
        display: flex; overflow-x: auto; overflow-y: hidden; padding: 0 clamp(1.5rem, 4vw, 4rem); gap: 8px;
        scrollbar-width: none; -ms-overflow-style: none; scroll-padding-inline: clamp(1.5rem, 4vw, 4rem); padding-bottom: 4px;
      }
      .content-row-scroll::-webkit-scrollbar { display: none; }
      .content-card { flex-shrink: 0; width: 150px; position: relative; cursor: pointer; border-radius: var(--radius); overflow: hidden; transition: transform 0.25s cubic-bezier(0.4,0,0.2,1), box-shadow 0.25s ease; background: var(--card); }
      .content-card:hover { transform: scale(1.05); box-shadow: 0 12px 40px rgba(0,0,0,0.8); z-index: 10; }
      .content-card-img { width: 100%; aspect-ratio: 2/3; object-fit: cover; display: block; background: var(--card); }

      .content-card-badge { position: absolute; top: 6px; left: 6px; display: flex; flex-direction: column; gap: 3px; align-items: flex-start; }
      .badge-year { font-size: 10px; background: rgba(0,0,0,0.7); color: #fff; padding: 1px 5px; border-radius: 3px; }
      .badge-type { font-size: 9px; font-weight: 700; background: var(--red); color: #fff; padding: 1px 5px; border-radius: 3px; letter-spacing: 0.5px; }
      .content-card-wide { flex-shrink: 0; width: 300px; aspect-ratio: 16/9; position: relative; border-radius: var(--radius); overflow: hidden; cursor: pointer; background: var(--card); }
      .content-card-wide-img { width: 100%; height: 100%; object-fit: cover; display: block; }

      .content-card-wide-title { font-size: 14px; font-weight: 700; }

      .content-card-wide-meta svg { width: 12px; height: 12px; }

      /* Skeleton */
      @keyframes shimmer { 0% { background-position: -400px 0; } 100% { background-position: 400px 0; } }
      .skeleton-card { flex-shrink: 0; width: 150px; aspect-ratio: 2/3; border-radius: var(--radius); animation: shimmer 1.6s infinite; background: linear-gradient(90deg, var(--card) 25%, var(--card-hover) 50%, var(--card) 75%); background-size: 800px 100%; }
      .skeleton-title { height: 28px; width: 40%; margin: 0 0 0.75rem; border-radius: var(--radius); animation: shimmer 1.6s infinite; background: linear-gradient(90deg, var(--card) 25%, var(--card-hover) 50%, var(--card) 75%); background-size: 800px 100%; }
      .skeleton-title.short { width: 25%; }
      .skeleton-para { height: 14px; width: 90%; margin: 0 0 0.5rem; border-radius: var(--radius-sm); animation: shimmer 1.6s infinite; background: linear-gradient(90deg, var(--card) 25%, var(--card-hover) 50%, var(--card) 75%); background-size: 800px 100%; }
      .skeleton-para.short { width: 70%; }
      .skeleton-hero { height: 56.25vw; min-height: 420px; max-height: 700px; animation: shimmer 1.6s infinite; background: linear-gradient(90deg, var(--card) 25%, var(--card-hover) 50%, var(--card) 75%); background-size: 800px 100%; }

      /* Search */
      .search-screen { padding-top: var(--header-h); }
      .search-box-wrapper { position: relative; z-index: 50; background: var(--bg); padding: 1.25rem clamp(1.5rem, 4vw, 4rem); display: flex; align-items: center; border-bottom: 1px solid var(--border); }
      .search-icon { position: absolute; left: calc(clamp(1.5rem, 4vw, 4rem) + 12px); top: 50%; transform: translateY(-50%); color: var(--text-muted); width: 18px; height: 18px; pointer-events: none; }
      .search-input { width: 100%; background: var(--surface); border: 1px solid rgba(255,255,255,0.12); border-radius: var(--radius-sm); color: var(--text); font-size: 15px; font-family: var(--font); padding: 10px 44px; outline: none; transition: border-color 0.2s, background 0.2s; }
      .search-input:focus { border-color: var(--text); background: var(--card); }
      .search-input::placeholder { color: var(--text-muted); }
      .search-clear { position: absolute; right: calc(clamp(1.5rem, 4vw, 4rem) + 10px); top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 4px; display: flex; border-radius: 50%; transition: color 0.2s; }
      .search-clear:hover { color: var(--text); }
      .search-clear svg { width: 16px; height: 16px; }
      .search-results { padding: 1.5rem clamp(1.5rem, 4vw, 4rem); }
      .content-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px 16px; }
      .search-empty { text-align: center; padding: 5rem 2rem; color: var(--text-muted); }
      .search-empty svg { width: 52px; height: 52px; margin: 0 auto 14px; display: block; opacity: 0.35; }
      .search-empty p { font-size: 16px; }
      .search-empty strong { color: var(--text); }

      /* Detail */
      .detail-screen { padding-bottom: 3rem; }
      .detail-backdrop { position: relative; height: 65vh; min-height: 400px; max-height: 700px; overflow: hidden; }
      .detail-backdrop-img { width: 100%; height: 100%; object-fit: cover; object-position: center 20%; }
      .detail-backdrop-overlay { position: absolute; inset: 0; background: linear-gradient(to top, var(--bg) 0%, transparent 50%), linear-gradient(to right, rgba(0,0,0,0.5) 0%, transparent 60%), linear-gradient(to bottom, rgba(0,0,0,0.4) 0%, var(--bg) 100%); }
      .detail-back-btn { position: absolute; top: calc(var(--header-h) + 14px); left: 1.25rem; z-index: 5; background: rgba(0,0,0,0.5); border: none; color: #fff; cursor: pointer; padding: 8px; border-radius: 50%; display: flex; transition: background 0.15s; }
      .detail-back-btn:hover { background: rgba(0,0,0,0.85); }
      .detail-back-btn svg { width: 20px; height: 20px; }
      .detail-bookmark-btn { position: absolute; top: calc(var(--header-h) + 14px); right: 1.25rem; z-index: 5; width: 40px; height: 40px; border-radius: 50%; border: 1.5px solid rgba(255,255,255,0.35); background: rgba(42,42,42,0.6); color: var(--text); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: border-color 0.15s, background 0.15s; backdrop-filter: blur(4px); }
      .detail-bookmark-btn:hover { border-color: rgba(255,255,255,0.7); background: rgba(42,42,42,0.9); }
      .detail-bookmark-btn.saved { background: var(--red); border-color: var(--red); }
      .detail-bookmark-btn svg { width: 18px; height: 18px; }
      .detail-body { padding: 0 clamp(2rem, 6vw, 6rem); margin-top: -3rem; position: relative; z-index: 3; }
      .detail-poster-row { display: flex; gap: 1.25rem; align-items: flex-end; }
      .detail-poster { width: 140px; border-radius: var(--radius); box-shadow: 0 8px 30px rgba(0,0,0,0.6); display: block; }
      .detail-info { flex: 1; min-width: 0; }
      .detail-title { font-size: clamp(1.8rem, 4vw, 3.5rem); font-weight: 900; line-height: 1.05; margin-bottom: 0.75rem; letter-spacing: -0.5px; }
      .detail-meta { display: flex; align-items: center; gap: 10px; margin-bottom: 1rem; flex-wrap: wrap; }
      .detail-rating { display: flex; align-items: center; gap: 4px; color: var(--gold); font-weight: 700; font-size: 14px; }
      .detail-rating svg { width: 16px; height: 16px; }
      .detail-type-badge { font-size: 11px; font-weight: 700; border: 1px solid rgba(255,255,255,0.2); padding: 1px 6px; border-radius: 3px; color: var(--text-sub); }
      .detail-genre { font-size: 13px; color: var(--text-sub); }
      .detail-quality-badge { display: flex; flex-wrap: wrap; gap: 16px; margin: 1rem 0; color: var(--text-sub); font-size: 13px; }
      .detail-watch-btn { display: inline-flex; align-items: center; gap: 10px; background: var(--text); color: #000; border: none; border-radius: var(--radius-sm); padding: 12px 32px; font-size: 16px; font-weight: 700; font-family: var(--font); cursor: pointer; transition: transform 0.15s, background 0.15s; }
      .detail-watch-btn svg { width: 24px; height: 24px; }
      .detail-watch-btn:hover { background: #e6e6e6; transform: scale(1.02); }
      .detail-watch-btn:active { transform: scale(0.97); }
      .detail-stream-btn { display: inline-flex; align-items: center; gap: 8px; background: #e50914; color: #fff; font-size: 16px; font-weight: 700; border: none; border-radius: 4px; padding: 12px 22px; text-decoration: none; cursor: pointer; font-family: var(--font); }
      .detail-stream-btn:hover { background: #b20710; }
      .detail-stream-btn svg { width: 20px; height: 20px; }
      .player-modal { position: fixed; inset: 0; z-index: 1000; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
      .player-modal.open { opacity: 1; pointer-events: auto; }
      .player-modal-backdrop { position: absolute; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(4px); }
      .player-modal-container { position: relative; width: min(92vw, calc(90vh * 16 / 9), 1100px); aspect-ratio: 16 / 9; background: #000; border-radius: 12px; overflow: hidden; transform: scale(0.95); transition: transform 0.3s ease; box-shadow: 0 20px 60px rgba(0,0,0,0.6); }
      .player-modal.open .player-modal-container { transform: scale(1); }
      .player-modal-header { position: absolute; top: 0; left: 0; right: 0; display: flex; justify-content: space-between; align-items: center; padding: 10px 12px; z-index: 2; background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent); }
      .player-modal-sources button { background: rgba(255,255,255,0.12); border: none; color: #fff; font-size: 12px; padding: 5px 10px; margin-right: 6px; border-radius: 14px; cursor: pointer; }
      .player-modal-sources button.active { background: #e50914; }
      .player-modal-close { background: rgba(255,255,255,0.12); border: none; color: #fff; width: 34px; height: 34px; border-radius: 50%; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
      .player-modal-close:hover { background: #e50914; }
      .player-modal-iframe { width: 100%; height: 100%; border: 0; display: block; }
      .player-modal-loading { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 14px; z-index: 1; }
      .player-modal-message { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 1.5rem; color: rgba(255,255,255,0.8); font-size: 14px; line-height: 1.6; z-index: 1; }
      .player-modal-message code { background: rgba(255,255,255,0.12); padding: 2px 6px; border-radius: 4px; font-size: 13px; }
      @media (max-width: 600px) { .player-modal-container { width: 100vw; height: 100dvh; max-width: none; aspect-ratio: auto; border-radius: 0; } }
      .detail-section { margin-top: 1.5rem; }
      .detail-section-title { font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 0.75rem; }
      .detail-overview { font-size: 14px; color: var(--text-sub); line-height: 1.65; max-width: 700px; }
      .detail-meta-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 14px; margin-top: 10px; }
      .detail-meta-item { display: flex; flex-direction: column; gap: 4px; }
      .detail-meta-label { font-size: 12px; letter-spacing: 0.5px; text-transform: uppercase; color: rgba(255,255,255,0.5); }
      .detail-meta-value { font-size: 14px; color: #fff; }
      .detail-chips { display: flex; flex-wrap: wrap; gap: 8px; }
      .detail-chip { padding: 6px 14px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.2); background: rgba(42,42,42,0.6); color: var(--text-sub); font-size: 13px; font-weight: 500; font-family: var(--font); cursor: pointer; transition: background 0.2s, color 0.2s, border-color 0.2s; backdrop-filter: blur(4px); }
      .detail-chip.active { background: var(--red); color: #fff; border-color: var(--red); }
      .detail-episodes { display: flex; flex-direction: column; gap: 6px; margin-top: 0.5rem; }
      .detail-episode { display: flex; align-items: center; gap: 12px; padding: 10px 14px; background: var(--surface); border-radius: var(--radius); cursor: pointer; transition: background 0.2s; border: 1px solid transparent; }
      .detail-episode:hover { background: var(--card); }
      .detail-episode.selected { border-color: var(--text); background: var(--card); }
      .detail-episode-num { font-size: 13px; font-weight: 700; color: var(--text-muted); min-width: 28px; text-align: center; }
      .detail-episode-info { flex: 1; min-width: 0; }
      .detail-episode-name { font-size: 13px; font-weight: 600; color: var(--text); display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px; }
      .detail-episode-overview { font-size: 11px; color: var(--text-muted); line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
      .detail-episode-current { font-size: 10px; color: var(--red); font-weight: 700; flex-shrink: 0; }
      .detail-skeleton-hero { height: 65vh; min-height: 400px; max-height: 700px; animation: shimmer 1.6s infinite; background: linear-gradient(90deg, var(--card) 25%, var(--card-hover) 50%, var(--card) 75%); background-size: 800px 100%; }
      .detail-skeleton-body { padding: 1.5rem clamp(2rem, 6vw, 6rem); }
      .detail-error { text-align: center; padding: 6rem 2rem; color: var(--text-sub); }
      .detail-retry-btn { margin-top: 1rem; background: var(--red); color: #fff; border: none; padding: 10px 20px; border-radius: var(--radius-sm); cursor: pointer; font-weight: 700; }

      /* Player (iframe) */
      .player-screen { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; }
      .player-loading { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 18px; color: var(--text); background: #000; z-index: 5; }
      .player-spinner { width: 44px; height: 44px; border: 3px solid rgba(229,9,20,0.2); border-top-color: var(--red); border-radius: 50%; animation: spin 0.7s linear infinite; }
      @keyframes spin { to { transform: rotate(360deg); } }
      .player-loading p { font-size: 14px; font-weight: 500; letter-spacing: 0.5px; }
      .player-iframe { width: 100%; height: 100%; border: none; display: block; background: #000; }
      .player-controls { position: absolute; top: 0; left: 0; right: 0; padding: 18px 24px; display: flex; align-items: center; justify-content: space-between; background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, transparent 100%); z-index: 10; transition: opacity 0.3s ease; }
      .player-controls.hidden { opacity: 0; pointer-events: none; }
      .player-close-btn { width: 36px; height: 36px; border-radius: 50%; background: rgba(0,0,0,0.5); border: none; color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.15s; flex-shrink: 0; }
      .player-close-btn:hover { background: rgba(0,0,0,0.8); }
      .player-close-btn svg { width: 18px; height: 18px; }
      .player-title { font-size: 14px; font-weight: 600; color: rgba(255,255,255,0.9); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 60%; }
      .player-src { display: flex; align-items: center; }
      .player-src-select {
        background: rgba(0,0,0,0.6); color: #fff; border: 1px solid rgba(255,255,255,0.25);
        border-radius: 4px; padding: 5px 8px; font-size: 12px; font-family: var(--font); cursor: pointer; outline: none;
      }
      .player-src-select:hover { border-color: rgba(255,255,255,0.5); }

      /* Watchlist */
      .watchlist-screen { padding: calc(var(--header-h) + 1.5rem) clamp(1.5rem, 4vw, 4rem) 3rem; }
      .watchlist-header { margin-bottom: 1.5rem; }
      .watchlist-title { font-size: 28px; font-weight: 900; margin-bottom: 4px; }
      .watchlist-count { font-size: 13px; color: var(--text-muted); }
      .watchlist-item { position: relative; }
      .watchlist-remove { position: absolute; top: 4px; right: 4px; width: 24px; height: 24px; border-radius: 50%; background: rgba(0,0,0,0.8); border: 1px solid rgba(255,255,255,0.3); color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.15s; z-index: 10; }
      .watchlist-item:hover .watchlist-remove { opacity: 1; }
      .watchlist-remove svg { width: 11px; height: 11px; }
      .watchlist-empty { text-align: center; padding: 6rem 2rem; color: var(--text-muted); }
      .watchlist-empty svg { width: 56px; height: 56px; margin: 0 auto 16px; display: block; opacity: 0.3; }
      .watchlist-empty p { font-size: 18px; font-weight: 600; color: var(--text-sub); margin-bottom: 6px; }
      .watchlist-empty span { font-size: 13px; }

      .home-hero { margin-top: calc(var(--header-h) * -1); }
      .home-rows { margin-top: 1.5rem; }

      /* Responsive */
      @media (max-width: 768px) {
        .content-card { width: 120px; }
        .skeleton-card { width: 120px; }
        .content-grid { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 10px; }
        .hero-content { bottom: 24%; left: 1.5rem; max-width: 85%; }
        .hero-play-btn { padding: 9px 20px; font-size: 14px; }
        .detail-body { padding: 0 1.5rem; }
        .detail-poster-row { flex-direction: column; align-items: flex-start; }
        .detail-poster { width: 110px; }
        .header-nav { display: none; }
        .home-hero { margin-top: 0; }
      }
      @media (min-width: 1024px) {
        .content-card { width: 170px; }
        .skeleton-card { width: 170px; }
        .content-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
      }
      /* Netflix-style player */
      .np-screen { position: fixed; inset: 0; background: #000; z-index: 50; overflow: hidden; }
      .np-video { width: 100%; height: 100%; background: #000; display: block; }
      .np-overlay { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #fff; text-align: center; padding: 1rem; gap: 14px; }
      .np-overlay p { opacity: 0.85; }
      .np-spinner { width: 46px; height: 46px; border: 4px solid rgba(255,255,255,0.2); border-top-color: #e50914; border-radius: 50%; animation: np-spin 1s linear infinite; }
      @keyframes np-spin { to { transform: rotate(360deg); } }
      .np-center-btn { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 84px; height: 84px; border-radius: 50%; background: rgba(0,0,0,0.55); border: 2px solid rgba(255,255,255,0.8); display: flex; align-items: center; justify-content: center; cursor: pointer; color: #fff; }
      .np-bar { position: absolute; left: 0; right: 0; bottom: 0; padding: 0 18px 14px; background: linear-gradient(transparent, rgba(0,0,0,0.85)); transition: opacity 0.3s; }
      .np-bar.hidden { opacity: 0; pointer-events: none; }
      .np-seek { width: 100%; height: 5px; -webkit-appearance: none; appearance: none; background: rgba(255,255,255,0.25); border-radius: 3px; outline: none; cursor: pointer; }
      .np-seek::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: #e50914; cursor: pointer; }
      .np-seek::-moz-range-thumb { width: 14px; height: 14px; border: none; border-radius: 50%; background: #e50914; cursor: pointer; }
      .np-row { display: flex; align-items: center; gap: 14px; margin-top: 10px; color: #fff; }
      .np-row svg { width: 24px; height: 24px; cursor: pointer; }
      .np-time { font-size: 13px; opacity: 0.85; min-width: 92px; }
      .np-spacer { flex: 1; }
      .np-ico-btn { background: none; border: none; color: #fff; cursor: pointer; padding: 0; display: flex; align-items: center; }
      .np-vol { width: 80px; -webkit-appearance: none; appearance: none; height: 4px; background: rgba(255,255,255,0.3); border-radius: 3px; outline: none; cursor: pointer; }
      .np-vol::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; border-radius: 50%; background: #fff; cursor: pointer; }
      .np-menu { position: absolute; right: 18px; bottom: 70px; background: rgba(15,15,15,0.96); border: 1px solid rgba(255,255,255,0.12); border-radius: 8px; padding: 10px; min-width: 210px; color: #fff; }
      .np-menu label { display: block; font-size: 12px; opacity: 0.7; margin: 8px 0 4px; }
      .np-menu select { width: 100%; background: #222; color: #fff; border: 1px solid rgba(255,255,255,0.2); border-radius: 5px; padding: 6px; font-size: 13px; }
      .np-ext { color: #fff; text-decoration: none; background: #e50914; padding: 10px 18px; border-radius: 6px; font-weight: 600; display: inline-block; margin-top: 6px; border: none; cursor: pointer; font: inherit; }
      .np-ext.active { background: #fff; color: #e50914; }
      .np-close { position: absolute; top: 16px; left: 16px; z-index: 2; background: rgba(0,0,0,0.5); border: none; color: #fff; width: 42px; height: 42px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }
      .np-close svg { width: 22px; height: 22px; }
      .np-sources { position: absolute; top: 16px; left: 50%; transform: translateX(-50%); z-index: 2; display: flex; gap: 8px; }
      .np-src-btn { background: rgba(0,0,0,0.55); border: 1px solid rgba(255,255,255,0.25); color: #fff; padding: 8px 14px; border-radius: 20px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: var(--font); }
      .np-src-btn.active { background: #e50914; border-color: #e50914; }
      .np-loading { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; text-align: center; padding: 1rem; color: #fff; font-size: 14px; background: #000; }
      .np-iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: 0; background: #000; }
      .np-fallback { position: absolute; left: 0; right: 0; bottom: 0; display: flex; gap: 12px; align-items: center; justify-content: center; flex-wrap: wrap; padding: 12px; background: linear-gradient(transparent, rgba(0,0,0,0.85)); color: #fff; font-size: 13px; z-index: 2; }
      .np-fallback .np-ext { margin-top: 0; }
      .np-streams { max-width: 520px; width: 100%; max-height: 40vh; overflow-y: auto; text-align: left; }
      .np-stream { display: block; width: 100%; text-align: left; background: #1a1a1a; color: #fff; border: 1px solid rgba(255,255,255,0.12); border-radius: 6px; padding: 10px 12px; margin-bottom: 8px; cursor: pointer; font-size: 13px; }
      .np-stream:hover { border-color: #e50914; }
      .np-prog { width: 240px; max-width: 70vw; height: 6px; background: rgba(255,255,255,0.2); border-radius: 3px; overflow: hidden; margin-top: 6px; }
      .np-prog > div { height: 100%; background: #e50914; }
    </style>
